name: docs

on:
  push:
  workflow_dispatch:

jobs:
  docs:
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Prepare docs for TT action
        run: |
          mkdir docs
          cp documentation/INFO.md docs/info.md

      - name: Build docs
        uses: TinyTapeout/tt-gds-action/docs@ttihp26a
