name: test
on: [push, workflow_dispatch]
jobs:
  test:
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        config: [Full, Lite, Tiny, Ultra-Tiny, Tiny-Serial]
    steps:
      - name: Checkout repo
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install Tools (iverilog, yosys)
        shell: bash
        run: sudo apt-get update && sudo apt-get install -y iverilog yosys gtkwave

      # Set Python up and install cocotb
      - name: Setup python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install Python packages
        shell: bash
        run: pip install -r test/requirements.txt

      - name: Gate Analysis
        if: matrix.config == 'Full'
        run: |
          python3 test/gate_analysis.py

      - name: Verify M3 Integration Compilation
        if: matrix.config == 'Full'
        run: |
          # Verify compilation of all M3 modes using iverilog
          for mode in M3_MODE_GPIO M3_MODE_APB M3_MODE_AHB; do
            echo "Verifying $mode..."
            iverilog -g2012 -Isrc -D$mode src/project.v src_gowin/tt_gowin_top_m3.v src_gowin/gowin_empu_m3_stub.v -o m3_test
            rm m3_test
          done

      - name: Run tests
        run: |
          cd test
          make clean
          if [ "${{ matrix.config }}" == "Full" ]; then
            export COMPILE_ARGS="-P tb.ALIGNER_WIDTH=40 -P tb.ACCUMULATOR_WIDTH=32 -P tb.SUPPORT_E5M2=1 -P tb.SUPPORT_MXFP6=1 -P tb.SUPPORT_MXFP4=1 -P tb.SUPPORT_INT8=1 -P tb.SUPPORT_PIPELINING=1 -P tb.SUPPORT_ADV_ROUNDING=1 -P tb.SUPPORT_MIXED_PRECISION=1 -P tb.ENABLE_SHARED_SCALING=1 -P tb.SUPPORT_SERIAL=0 -P tb.SERIAL_K_FACTOR=1"
          elif [ "${{ matrix.config }}" == "Lite" ]; then
            export COMPILE_ARGS="-P tb.ALIGNER_WIDTH=40 -P tb.ACCUMULATOR_WIDTH=32 -P tb.SUPPORT_E5M2=1 -P tb.SUPPORT_MXFP6=0 -P tb.SUPPORT_MXFP4=1 -P tb.SUPPORT_INT8=1 -P tb.SUPPORT_PIPELINING=1 -P tb.SUPPORT_ADV_ROUNDING=0 -P tb.SUPPORT_MIXED_PRECISION=1 -P tb.ENABLE_SHARED_SCALING=1 -P tb.SUPPORT_SERIAL=0 -P tb.SERIAL_K_FACTOR=1"
          elif [ "${{ matrix.config }}" == "Tiny" ]; then
            export COMPILE_ARGS="-P tb.ALIGNER_WIDTH=40 -P tb.ACCUMULATOR_WIDTH=32 -P tb.SUPPORT_E5M2=0 -P tb.SUPPORT_MXFP6=0 -P tb.SUPPORT_MXFP4=1 -P tb.SUPPORT_INT8=0 -P tb.SUPPORT_PIPELINING=0 -P tb.SUPPORT_ADV_ROUNDING=0 -P tb.SUPPORT_MIXED_PRECISION=0 -P tb.ENABLE_SHARED_SCALING=0 -P tb.SUPPORT_SERIAL=0 -P tb.SERIAL_K_FACTOR=1"
          elif [ "${{ matrix.config }}" == "Ultra-Tiny" ]; then
            export COMPILE_ARGS="-P tb.SUPPORT_SERIAL=0 -P tb.SERIAL_K_FACTOR=1"
          elif [ "${{ matrix.config }}" == "Tiny-Serial" ]; then
            export COMPILE_ARGS="-P tb.SUPPORT_SERIAL=1 -P tb.SERIAL_K_FACTOR=8"
          fi
          make
          # make will return success even if the test fails, so check for results.xml
          if [ ! -f results.xml ]; then
            echo "Error: results.xml not found. Simulation may have failed to run."
            exit 1
          fi
          if grep -q failure results.xml; then
            echo "Test failed: $(grep failure results.xml)"
            exit 1
          fi

      - name: Convert FST to VCD
        if: always()
        run: |
          if [ -f test/tb.fst ]; then
            fst2vcd -f test/tb.fst -o test/tb.vcd
          else
            echo "Warning: test/tb.fst not found. Skipping waveform conversion."
          fi

      - name: Test Summary
        uses: test-summary/action@v2.4
        with:
          paths: "test/results.xml"
        if: always()

      - name: upload waveform and test results
        if: success() || failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.config }}
          path: |
            test/tb.fst
            test/tb.vcd
            test/results.xml
            test/output/*
