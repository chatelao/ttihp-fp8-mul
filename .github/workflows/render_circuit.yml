name: render_circuit

on:
  push:
    paths:
      - 'docs/diagrams/CIRCUIT.tex'
      - 'scripts/render_circuit.py'
      - '.github/workflows/render_circuit.yml'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y texlive-latex-base texlive-latex-extra texlive-pictures dvisvgm

      - name: Render circuit diagram
        run: python3 scripts/render_circuit.py

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/circuit.svg
          git diff --quiet && git diff --staged --quiet || (git commit -m "Automated render of circuit diagram" && git push)
