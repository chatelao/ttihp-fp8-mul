name: wasm

on:
  push:
  workflow_dispatch:
  release:
    types: [published]

jobs:
  wasm:
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        variant: [Full, Lite, Tiny, Ultra-Tiny, Tiny-Serial]

    permissions:
      contents: write
      pages: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Verilator
        run: |
          sudo apt-get update
          sudo apt-get install -y verilator

      - name: Setup Emscripten
        uses: mymindstorm/setup-emsdk@v14
        with:
          version: 3.1.56

      - name: Build WASM
        run: |
          cd wasm
          make VARIANT=${{ matrix.variant }}

      - name: Prepare Demo Directory
        if: matrix.variant == 'Full'
        run: |
          mkdir -p demo
          cp -r docs/web/* demo/
          cp wasm/digital_twin_Full.js demo/
          cp wasm/digital_twin_Full.wasm demo/

      - name: Upload Release Assets
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wasm/digital_twin_${{ matrix.variant }}.js
            wasm/digital_twin_${{ matrix.variant }}.wasm
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload WASM Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wasm_digital_twin_${{ matrix.variant }}
          path: |
            wasm/digital_twin_${{ matrix.variant }}.js
            wasm/digital_twin_${{ matrix.variant }}.wasm

      - name: Deploy Demo to GitHub Pages
        if: matrix.variant == 'Full' && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./demo
          destination_dir: demo
          keep_files: true
